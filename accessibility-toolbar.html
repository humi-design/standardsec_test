<!-- accessibility-toolbar.html -->
<div class="accessibility-menu" aria-label="Accessibility Tools">
    <!-- Floating Toggle Button -->
    <button id="accessibilityToggle" class="fab" aria-expanded="false" aria-controls="accessibilityPanel">
      ♿
    </button>
  
    <!-- Hidden Panel -->
    <div id="accessibilityPanel" class="accessibility-panel" hidden>
      <button onclick="changeFontSize(1)" aria-label="Increase text size">A+</button>
      <button onclick="changeFontSize(-1)" aria-label="Decrease text size">A-</button>
      <button onclick="toggleDarkMode()" aria-label="Toggle dark mode">🌙 Dark Mode</button>
      <button onclick="readContent()" aria-label="Read page aloud">🔊 Read</button>
      <a href="accessibility.html" aria-label="Accessibility Statement">♿ Accessibility</a>
    </div>
  </div>
  
  <link rel="stylesheet" href="accessibility-toolbar.css">
  <script src="accessibility-toolbar.js"></script>
