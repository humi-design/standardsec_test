<!DOCTYPE html>
<html>
<head>
    <title>Complaint Form</title>
</head>
<body>

    <style>
    .lang-toggle {
        display: inline-flex !important;
        gap: 6px;
        margin-left: 15px;
        vertical-align: middle;
    }
    .lang-toggle button {
        padding: 3px 8px;
        border: 1px solid rgba(255,255,255,0.6);
        background: rgba(0,0,0,0.2);
        color: #fff;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
        font-family: inherit;
        transition: all 0.2s ease;
    }
    .lang-toggle button:hover {
        background: rgba(255,255,255,0.2);
    }
    .lang-toggle button.active,
    .lang-toggle button[aria-pressed="true"] {
        background: rgba(255,255,255,0.3);
        border-color: #fff;
        font-weight: bold;
    }
    .lang-toggle button:focus {
        outline: 2px solid #fff;
        outline-offset: 2px;
    }
    </style>

    <a href="#main-content" class="skip-link">Skip to main content</a>

<h2>Register a Complaint</h2>
<form method="post" action="complaint.php">
    <label for="customer_name">Customer Name:</label><br>
    <input type="text" id="customer_name" name="customer_name" required><br>
    
    <label for="customer_email">Customer Email:</label><br>
    <input type="email" id="customer_email" name="customer_email" required><br>
    
    <label for="complaint">Complaint:</label><br>
    <textarea id="complaint" name="complaint" rows="4" required></textarea><br>
    
    <input type="submit" value="Submit">
</form>


    <!-- Custom Language Translation Script -->
    <script>
    const translations = {
        'hi': {
            'Products': 'उत्पाद',
            'About Us': 'हमारे बारे में',
            'Contact': 'संपर्क',
            'Login': 'लॉग इन',
            'Quick Links': 'त्वरित लिंक',
            'Downloads': 'डाउनलोड',
            'KYC': 'केवाईसी',
            'Complaints': 'शिकायतें',
            'Open Account': 'खाता खोलें',
            'Open account': 'खाता खोलें',
            'Open an Account': 'खाता खोलें',
            'Fund Transfer': 'फंड ट्रांसफर',
            'Online Trading': 'ऑनलाइन ट्रेडिंग',
            'Back Office': 'बैक ऑफिस',
            'Home': 'होम',
            'History': 'इतिहास',
            'Our Management': 'हमारा प्रबंधन',
            'Careers': 'करियर',
            'Terms': 'नियम',
            'Privacy Policies': 'गोपनीयता',
            'Disclaimer': 'अस्वीकरण',
            'Policies & Procedures': 'नीतियां',
            'Investor Charter': 'निवेशक चार्टर',
            'SEBI': 'सेबी',
            'NSE': 'एनएसई',
            'BSE': 'बीएसई',
            'CDSL': 'सीडीएसएल',
            'Equity': 'इक्विटी',
            'Equities': 'इक्विटी',
            'Currency': 'करेंसी',
            'Commodities': 'कमोडिटी',
            'IPOs': 'आईपीओ',
            'Advisory': 'सलाह',
            'Depository': 'डिपॉजिटरी',
            'Need help?': 'मदद चाहिए?',
            'Connect': 'जुड़ें',
            'Email': 'ईमेल',
            'Copyright': 'कॉपीराइट',
            'Attention Investor': 'निवेशकों का ध्यान',
            'Read more': 'और पढ़ें',
            'Learn more': 'और जानें',
            'Menu': 'मेन्यू'
        }
    };
    
    function setLanguage(lang) {
        document.documentElement.lang = lang;
        document.getElementById('lang-en').setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
        document.getElementById('lang-hi').setAttribute('aria-pressed', lang === 'hi' ? 'true' : 'false');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        document.getElementById('lang-hi').classList.toggle('active', lang === 'hi');
        localStorage.setItem('preferredLang', lang);
        if (lang === 'hi') {
            translatePageToHindi();
        } else {
            location.reload();
        }
    }
    
    function translatePageToHindi() {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                const parent = node.parentElement;
                if (!parent) return NodeFilter.FILTER_REJECT;
                const tagName = parent.tagName.toLowerCase();
                if (['script', 'style', 'noscript', 'textarea', 'input'].includes(tagName)) {
                    return NodeFilter.FILTER_REJECT;
                }
                if (parent.hasAttribute('data-translated') || parent.closest('.lang-toggle')) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
            const text = node.textContent.trim();
            if (text && translations['hi'][text]) {
                node.textContent = translations['hi'][text];
                node.parentElement.setAttribute('data-translated', 'true');
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('preferredLang') === 'hi') setLanguage('hi');
    });
    </script>

</body>
</html>
