    .fab {
    position: fixed;

    border-radius: 10%; /* makes it a circle */

    .fab img,

    height: 50%;
    object-fit: contain;
    }

    <!-- JS -->
    <script>
    const toggleBtn = document.getElementById("accessibilityToggle");
    const panel = document.getElementById("accessibilityPanel");
    
    toggleBtn.addEventListener("click", () => {
    const expanded = toggleBtn.getAttribute("aria-expanded") === "true";
    toggleBtn.setAttribute("aria-expanded", !expanded);
    panel.hidden = expanded; // Toggle show/hide
    });
    
    // Font resize
    function changeFontSize(delta) {
    let body = document.body;
    let currentSize = parseFloat(window.getComputedStyle(body, null).getPropertyValue('font-size'));
    body.style.fontSize = (currentSize + delta) + 'px';
    }
    
    // Dark mode toggle
    function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    }
    
    <!-- Improved Read Button Script with Language Detection -->
    <script>
    // Text-to-speech with language detection
    function readContent() {
        // Get current language from localStorage or default to English
        const currentLang = localStorage.getItem('preferredLang') || 'en';
        
        // Get content from main or body
        const contentElement = document.querySelector('main') || document.querySelector('#main-content') || document.body;
        const text = contentElement.innerText;
        
        // Cancel any ongoing speech
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        }
        
        // Create speech utterance
        const speech = new SpeechSynthesisUtterance(text);
        
        // Set language based on current preference
        if (currentLang === 'hi') {
            speech.lang = 'hi-IN'; // Hindi (India)
            // Try to find a Hindi voice
            const voices = window.speechSynthesis.getVoices();
            const hindiVoice = voices.find(v => v.lang.startsWith('hi'));
            if (hindiVoice) speech.voice = hindiVoice;
        } else {
            speech.lang = 'en-IN'; // English (India)
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en-IN') || v.lang.startsWith('en'));
            if (englishVoice) speech.voice = englishVoice;
        }
        
        speech.rate = 0.9; // Slightly slower
        speech.pitch = 1;
        
        window.speechSynthesis.speak(speech);
    }
    
    // Stop reading
    function stopReading() {
        window.speechSynthesis.cancel();
    }
    
    // Load voices (needed for some browsers)
    window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.getVoices();
    };
    </script>
    </script>

    function setLanguage(lang) {
        document.documentElement.lang = lang;
        const langEn = document.getElementById('lang-en');
        const langHi = document.getElementById('lang-hi');
        if (langEn) langEn.setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
        if (langHi) langHi.setAttribute('aria-pressed', lang === 'hi' ? 'true' : 'false');
        if (langEn) langEn.classList.toggle('active', lang === 'en');
        if (langHi) langHi.classList.toggle('active', lang === 'hi');
        localStorage.setItem('preferredLang', lang);
        if (lang === 'hi') {
            translatePageToHindi();
        } else {
            location.reload();
        }
    }
    
    function translatePageToHindi() {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                const parent = node.parentElement;
                if (!parent) return NodeFilter.FILTER_REJECT;
                const tagName = parent.tagName.toLowerCase();
                if (['script', 'style', 'noscript', 'textarea', 'input'].includes(tagName)) {
                    return NodeFilter.FILTER_REJECT;
                }
                if (parent.hasAttribute('data-translated') || parent.closest('.lang-toggle')) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(node => {
            const text = node.textContent.trim();
            if (text && translations['hi'][text]) {
                node.textContent = translations['hi'][text];
                node.parentElement.setAttribute('data-translated', 'true');
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('preferredLang') === 'hi') setLanguage('hi');
    });
