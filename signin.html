    /* Floating button (circular) */
    .fab {

    border-radius: 10%; /* makes it a circle */

    color: white;
    border: none;
    cursor: pointer;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    overflow: hidden; /* ensures image/icons don’t overflow */
    padding: 0; /* removes extra space */
    }
    .fab img, 
    .fab svg {
    width: 50%; /* make icon fit nicely inside circle */
    height: 50%;
    object-fit: contain;
    }
    
    .fab:hover, .fab:focus {
    background-color: #0056b3;
    outline: 2px solid white;
    outline-offset: 2px;
    }
    
    /* Hidden menu */

    background: white;
    padding: 12px;

    <!-- JS -->
    <script>
    const toggleBtn = document.getElementById("accessibilityToggle");
    const panel = document.getElementById("accessibilityPanel");
    
    toggleBtn.addEventListener("click", () => {
    const expanded = toggleBtn.getAttribute("aria-expanded") === "true";
    toggleBtn.setAttribute("aria-expanded", !expanded);
    panel.hidden = expanded; // Toggle show/hide
    });
    
    // Font resize
    function changeFontSize(delta) {
    let body = document.body;
    let currentSize = parseFloat(window.getComputedStyle(body, null).getPropertyValue('font-size'));
    body.style.fontSize = (currentSize + delta) + 'px';
    }
    
    // Dark mode toggle
    function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    }
    
    // Text-to-speech
    function readContent() {
    let content = document.querySelector("main") || document.body;
    let text = content.innerText;
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN"; 
    window.speechSynthesis.speak(speech);
    }
    </script>

    let currentLang = 'en';
    
    function setLanguage(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        
        // Update toggle buttons
        document.getElementById('lang-en').setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
        document.getElementById('lang-hi').setAttribute('aria-pressed', lang === 'hi' ? 'true' : 'false');
        
        // Store preference
        localStorage.setItem('preferredLang', lang);
        
        // Translate page content
        if (lang === 'hi') {
            translatePageToHindi();
        } else {
            location.reload(); // Reset to English
        }
    }
    
    function translatePageToHindi() {
        // Get all translatable elements
        const walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            {
                acceptNode: function(node) {
                    // Skip script, style, and already translated elements
                    const parent = node.parentElement;
                    if (!parent) return NodeFilter.FILTER_REJECT;
                    const tagName = parent.tagName.toLowerCase();
                    if (['script', 'style', 'noscript', 'textarea', 'input'].includes(tagName)) {
                        return NodeFilter.FILTER_REJECT;
                    }
                    if (parent.hasAttribute('data-translated')) {
                        return NodeFilter.FILTER_REJECT;
                    }
                    return NodeFilter.FILTER_ACCEPT;
                }
            }
        );
        
        const textNodes = [];
        while (walker.nextNode()) {
            textNodes.push(walker.currentNode);
        }
        
        textNodes.forEach(node => {
            const text = node.textContent.trim();
            if (text && translations['hi'][text]) {
                node.textContent = translations['hi'][text];
                node.parentElement.setAttribute('data-translated', 'true');
            }
        });
    }
    
    // Load saved preference on page load
    document.addEventListener('DOMContentLoaded', function() {
        const savedLang = localStorage.getItem('preferredLang');
        if (savedLang === 'hi') {
            document.getElementById('lang-hi').click();
        }
    });
    </script>
